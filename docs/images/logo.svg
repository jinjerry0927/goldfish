<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="GoldFish 로고 — 어항 속 금붕어">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc04d"/>
      <stop offset="1" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdeafe"/>
      <stop offset="1" stop-color="#a9d6fb"/>
    </linearGradient>
  </defs>

  <!-- 어항(fishbowl) -->
  <path d="M60 64 A56 56 0 1 0 140 64 Z" fill="url(#water)" opacity="0.85"/>
  <ellipse cx="100" cy="64" rx="40" ry="12" fill="#bfe1fb"/>
  <path d="M60 64 A56 56 0 1 0 140 64" fill="none" stroke="#7fbdf0" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="100" cy="64" rx="40" ry="12" fill="none" stroke="#7fbdf0" stroke-width="4"/>

  <!-- 금붕어 -->
  <g transform="translate(4 6)">
    <!-- 꼬리 -->
    <path d="M58 110 q-22 -16 -30 -2 q12 4 14 14 q-10 8 -2 18 q14 -6 22 -14 Z" fill="url(#body)"/>
    <!-- 몸통 -->
    <ellipse cx="92" cy="112" rx="34" ry="24" fill="url(#body)"/>
    <!-- 위 지느러미 -->
    <path d="M86 90 q8 -16 22 -10 q-6 8 -4 16 Z" fill="#ffb733"/>
    <!-- 아래 지느러미 -->
    <path d="M82 134 q4 12 16 12 q-2 -8 2 -14 Z" fill="#ffb733"/>
    <!-- 눈 -->
    <circle cx="110" cy="106" r="6" fill="#ffffff"/>
    <circle cx="111" cy="106" r="3" fill="#2a2a2a"/>
    <!-- 입 -->
    <path d="M122 114 q5 2 4 7" fill="none" stroke="#e0851a" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 물방울 -->
  <circle cx="138" cy="96" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="148" cy="84" r="2.5" fill="#ffffff" opacity="0.7"/>
</svg>
